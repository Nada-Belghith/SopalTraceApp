# Tthis workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master", "feature/**" ]
  pull_request:
    branches: [ "master" ]
    paths:
      - 'SopalTraceApp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SopalTraceApp

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore SopalTraceApp.slnx
      
    - name: Build
      run: dotnet build SopalTraceApp.slnx --no-restore
      
